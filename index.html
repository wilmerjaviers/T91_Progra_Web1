<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="text-center mb-0">Calculadora de Notas</h3>
                    </div>
                    <div class="card-body">
                        <form id="gradeForm" novalidate>
                            <div class="mb-3">
                                <label for="grade1" class="form-label">Nota 1 (máximo 30%):</label>
                                <input type="number" class="form-control" id="grade1" required min="0" max="30" step="0.01">
                                <div class="invalid-feedback">
                                    Por favor ingrese una nota válida (0-30%)
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="grade2" class="form-label">Nota 2 (máximo 30%):</label>
                                <input type="number" class="form-control" id="grade2" required min="0" max="30" step="0.01">
                                <div class="invalid-feedback">
                                    Por favor ingrese una nota válida (0-30%)
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="grade3" class="form-label">Nota 3 (máximo 40%):</label>
                                <input type="number" class="form-control" id="grade3" required min="0" max="40" step="0.01">
                                <div class="invalid-feedback">
                                    Por favor ingrese una nota válida (0-40%)
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Calcular</button>
                                <button type="button" class="btn btn-secondary" id="clearBtn">Limpiar</button>
                            </div>
                        </form>
                        <div class="mt-3">
                            <div class="alert d-none" id="result">
                                <p class="mb-0">Nota Final: <span id="finalGrade"></span>%</p>
                                <p class="mb-0">Calificación: <span id="gradeCategory"></span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="calcular.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    </body>
</html>
