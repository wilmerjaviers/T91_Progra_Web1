<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Despensa</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0 text-center">Calculadora de Descuentos "Mi Despena.HN"</h3>
            </div>
            <div class="card-body">
                <form id="calculadoraForm">
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label for="producto1" class="form-label mt-2">Producto 1:</label>
                        </div>
                        <div class="col-md-9">
                            <input type="number" class="form-control" id="producto1" step="0.01" min="0">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label for="producto2" class="form-label mt-2">Producto 2:</label>
                        </div>
                        <div class="col-md-9">
                            <input type="number" class="form-control" id="producto2" step="0.01" min="0">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label for="producto3" class="form-label mt-2">Producto 3:</label>
                        </div>
                        <div class="col-md-9">
                            <input type="number" class="form-control" id="producto3" step="0.01" min="0">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label for="producto4" class="form-label mt-2">Producto 4:</label>
                        </div>
                        <div class="col-md-9">
                            <input type="number" class="form-control" id="producto4" step="0.01" min="0">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label for="producto5" class="form-label mt-2">Producto 5:</label>
                        </div>
                        <div class="col-md-9">
                            <input type="number" class="form-control" id="producto5" step="0.01" min="0">
                        </div>
                    </div>

                    <hr class="my-4">

                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label mt-2 fw-bold">Subtotal:</label>
                        </div>
                        <div class="col-md-9">
                            <input type="text" class="form-control fw-bold" id="subtotal" readonly>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label mt-2 fw-bold" id="labelDescuento">Descuento 0%:</label>
                        </div>
                        <div class="col-md-9">
                            <input type="text" class="form-control fw-bold" id="descuento" readonly>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label mt-2 fw-bold">Total a Pagar:</label>
                        </div>
                        <div class="col-md-9">
                            <input type="text" class="form-control fw-bold" id="total" readonly>
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col-md-6">
                            <button type="button" class="btn btn-primary w-100 fw-bold" onclick="calcular()">Calcular</button>
                        </div>
                        <div class="col-md-6">
                            <button type="button" class="btn btn-secondary w-100 fw-bold" onclick="limpiar()">Limpiar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
