<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Área de Rectángulo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="text-center mb-0">Calculadora de Área del Rectángulo</h3>
                    </div>
                    <div class="card-body">
                        <form id="rectangleForm" novalidate>
                            <div class="mb-3">
                                <label for="base" class="form-label">Base (cm):</label>
                                <input type="number" class="form-control" id="base" required min="0" step="0.01">
                                <div class="invalid-feedback">
                                    Por favor ingrese un valor válido para la base
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="height" class="form-label">Altura (cm):</label>
                                <input type="number" class="form-control" id="height" required min="0" step="0.01">
                                <div class="invalid-feedback">
                                    Por favor ingrese un valor válido para la altura
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Calcular</button>
                                <button type="button" class="btn btn-secondary" id="clearBtn">Limpiar</button>
                            </div>
                        </form>
                        <div class="mt-3">
                            <div class="alert alert-success d-none" id="result">
                                El área del rectángulo es: <span id="area"></span> cm²
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="calcular.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   
    </body>
</html>
